version: '3.8'

services:
  web:
    build: .
    container_name: gotravel_web
    ports:
      - "8080:80"
    volumes:
      - .:/var/www/html
    environment:
      DB_HOST: db
      DB_USER: ${DB_USER:-webdulich}
      DB_PASS: ${DB_PASS:-rootpassword}
      DB_NAME: ${DB_NAME:-webdulich}
    depends_on:
      - db

  db:
    image: mysql:8.0
    container_name: gotravel_db
    command: --default-authentication-plugin=mysql_native_password
    restart: always
    environment:
      MYSQL_ROOT_PASSWORD: ${DB_ROOT_PASS:-rootpassword}
      MYSQL_DATABASE: ${DB_NAME:-webdulich}
      MYSQL_USER: ${DB_USER:-webdulich}
      MYSQL_PASSWORD: ${DB_PASS:-rootpassword}
    ports:
      - "3306:3306"
    volumes:
      - db_data:/var/lib/mysql
      - ./database.sql:/docker-entrypoint-initdb.d/database.sql
  adminer:
    image: adminer:latest
    container_name: gotravel_adminer
    ports:
      - "8081:8080"
    depends_on:
      - db
volumes:
  db_data:
